trigger:
  branches:
    include:
      - main

pr: none

pool:
  name: SelfHosted

variables:
- group: github-actions-runner-azure-pipelines-agent

steps:
- checkout: self
  fetchDepth: 0

- task: PowerShell@2
  displayName: Sync templates repo to GitHub
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = "Stop"

      git config user.name "goldngroup-release-bot"
      git config user.email "release-bot@goldngroup.local"

      $githubUrl = "https://$env:GITHUB_TOKEN@github.com/GoldnGroup/unraid-templates.git"

      if (git remote | Select-String "^github$") {
        git remote set-url github $githubUrl
      } else {
        git remote add github $githubUrl
      }

      git push github HEAD:main --force

      Write-Host "Synced ADO Unraid-Templates to GitHub GoldnGroup/unraid-templates"
  env:
    GITHUB_TOKEN: $(GITHUB_TOKEN)